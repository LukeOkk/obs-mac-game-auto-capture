name: build

on:
  push:
    branches: [ main ]
    paths-ignore:
      - "**/*.md"
      - "CHANGELOG.md"
      - "LICENSE"
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos-arm64:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: |
          brew update >/dev/null
          brew list cmake >/dev/null 2>&1 || brew install cmake
          xcode-select -p >/dev/null 2>&1 || sudo xcode-select --install || true

      - name: Cache OBS deps
        uses: actions/cache@v4
        with:
          path: |
            .deps/obs-deps
            .deps/obs-studio
          key: obsdeps-${{ runner.os }}-arm64-${{ hashFiles('buildspec.json') }}

      - name: Stage OBS.app
        run: |
          # Download the OBS Studio macOS DMG from the obsproject GitHub
          # release and copy the .app into /Applications so build.sh can link
          # against libobs inside it. The Apple DMG is universal (arm64+x86).
          if [ ! -d /Applications/OBS.app ]; then
            OBS_TAG="32.1.2"
            curl -fL -o /tmp/obs.dmg \
              "https://github.com/obsproject/obs-studio/releases/download/${OBS_TAG}/OBS-Studio-${OBS_TAG}-macOS-Apple.dmg"
            hdiutil attach -nobrowse /tmp/obs.dmg -mountpoint /tmp/obsdmg
            cp -R /tmp/obsdmg/OBS.app /Applications/
            hdiutil detach /tmp/obsdmg
          fi
          ls -la /Applications/OBS.app/Contents/Frameworks/libobs.framework/libobs

      - name: Build plugin
        run: |
          chmod +x build.sh
          ./build.sh

      - name: Package
        run: |
          chmod +x package.sh
          ./package.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: obs-mac-game-auto-capture-${{ github.sha }}-arm64
          path: dist/*
          if-no-files-found: error
